name: Build Windows EXE

on:
  pull_request:
    branches:
      - develop  
  push:
    branches:
      - features/enhancements

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
        shell: powershell

      - name: Add uv to PATH
        run: echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install dependencies
        run: |
          uv sync
          uv add pyinstaller python-multipart requests fastapi uvicorn
        shell: powershell

      - name: Build EXE
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed `
            --name "Raf-Launcher" `
            --add-data "assets;assets" `
            --add-data "pyproject.toml;." `
            --paths "src" `
            src/main.py
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Launcher-EXE
          path: dist/Raf-Launcher.exe
          retention-days: 5
