name: Build DEV (PyInstaller)

on:
  push:
    branches:
      - develop
      - 'features/**'
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv add pyinstaller
        shell: powershell

      - name: Inject version
        run: |
          $version = Select-String -Path pyproject.toml -Pattern 'version\s*=\s*"([^"]+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          if (-not $version) { $version = "0.0.0" }
          "PROJECT_VERSION = '$version'" | Out-File -FilePath src/version.py -Encoding utf8
        shell: powershell

      - name: Generate credentials
        run: |
          $content = "SE_HOST = '${{ secrets.SE_HOST }}'`n" +
                     "SE_HUB = '${{ secrets.SE_HUB }}'`n" +
                     "SE_USER = '${{ secrets.SE_USER }}'`n" +
                     "SE_PASS = '${{ secrets.SE_PASS }}'"
          Set-Content -Path src/credentials.py -Value $content -Encoding utf8
        shell: powershell

      - name: Build EXE
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed `
            --name "Raf-Launcher-Dev" `
            --icon "assets/icon.ico" `
            --add-data "assets;assets" `
            --paths "src" `
            --clean `
            --exclude-module tkinter `
            --exclude-module unittest `
            src/main.py
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Raf-Launcher-Dev
          path: dist/Raf-Launcher-Dev.exe
          compression-level: 0
          retention-days: 1
