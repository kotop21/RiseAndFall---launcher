name: Build DEV (PyInstaller)

on:
  push:
    branches:
      - develop
      - 'features/**'
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
        shell: powershell

      - name: Add uv to PATH
        run: echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install dependencies
        run: |
          uv sync
          uv add pyinstaller python-multipart requests fastapi uvicorn
        shell: powershell

      - name: Inject version into code
        run: |
          $content = Get-Content pyproject.toml -Raw
          $version = [regex]::match($content, '(?m)^version\s*=\s*["'']([^"'']+)["'']').Groups[1].Value
          if (-not $version) { $version = "0.0.0" }
          Set-Content -Path src/version.py -Value "PROJECT_VERSION = '$version'" -Encoding utf8
        shell: powershell

      - name: Build EXE
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed `
            --name "Raf-Launcher-Dev" `
            --icon "assets/icon.ico" `
            --add-data "assets;assets" `
            --paths "src" `
            src/main.py
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Launcher-Dev
          path: dist/Raf-Launcher-Dev.exe
          retention-days: 5
